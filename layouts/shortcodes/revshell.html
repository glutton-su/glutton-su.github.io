<style>
.rs,.rs *{box-sizing:border-box;}
.rs *{margin:0;padding:0;}
:root{
  --n200:214,219,222;--n300:172,183,188;--n400:129,146,154;
  --n500:92,107,115;--n600:74,86,92;--n700:56,65,70;
  --n800:38,44,47;--n900:19,23,24;
  --p400:204,216,222;--p500:157,180,192;--p600:132,161,176;--p700:107,142,160;
  --s300:105,225,255;--s400:28,209,255;--s500:0,165,207;--s600:0,132,166;--s800:0,67,85;
}
.rs{font-family:monospace;font-size:12px;color:rgb(var(--n200));
  background:rgb(var(--n900));border:0.5px solid rgb(var(--n700));
  border-radius:8px;overflow:hidden;
  width:min(1040px,calc(100vw - 2rem));
  margin:1.5rem auto;}
.rs-top{background:rgb(var(--n800));padding:10px 14px;border-bottom:0.5px solid rgb(var(--n700));
  display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.rs-top label{font-size:10px;color:rgb(var(--p500));text-transform:uppercase;
  letter-spacing:0.08em;display:block;margin-bottom:3px;}
.rs-top input{padding:6px 10px;background:rgb(var(--n900));border:0.5px solid rgb(var(--n700));
  border-radius:4px;color:rgb(var(--n200));font-family:monospace;font-size:12px;}
.rs-top input:focus{outline:none;border-color:rgb(var(--s500));}
.rs-gen-btn{padding:7px 18px;border-radius:4px;border:none;background:rgb(var(--s500));
  color:#fff;font-family:monospace;font-size:12px;cursor:pointer;font-weight:500;align-self:flex-end;}
.rs-gen-btn:hover{background:rgb(var(--s600));}
.rs-listener-top{font-size:11px;color:rgb(var(--s300));background:rgb(var(--n900));
  padding:5px 10px;border-radius:4px;border:0.5px solid rgb(var(--n700));}
.rs-filter{background:rgb(var(--n800));padding:7px 14px;border-bottom:0.5px solid rgb(var(--n700));
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.rs-filter-label{font-size:10px;color:rgb(var(--n500));margin-right:2px;}
.rs-tag{padding:3px 10px;border-radius:20px;border:0.5px solid rgb(var(--n700));font-size:11px;
  cursor:pointer;background:transparent;color:rgb(var(--n400));font-family:monospace;}
.rs-tag:hover{background:rgb(var(--n800));color:rgb(var(--n200));}
.rs-tag.active{background:rgb(var(--s800));border-color:rgb(var(--s500));color:rgb(var(--s300));}
.rs-search{padding:4px 8px;background:rgb(var(--n900));border:0.5px solid rgb(var(--n700));
  border-radius:4px;color:rgb(var(--n200));font-family:monospace;font-size:11px;
  width:140px;margin-left:auto;}
.rs-search:focus{outline:none;border-color:rgb(var(--s500));}
.rs-body{max-height:480px;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:rgb(var(--n700)) transparent;}
.rs-cat-hdr{padding:5px 14px;font-size:10px;font-weight:500;color:rgb(var(--p500));
  text-transform:uppercase;letter-spacing:0.1em;background:rgb(var(--n800));
  border-bottom:0.5px solid rgb(var(--n700));position:sticky;top:0;z-index:1;}
.rs-card{border-bottom:0.5px solid rgb(var(--n800));padding:10px 14px;}
.rs-card:hover{background:rgb(var(--n800));}
.rs-card-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.rs-card-name{font-weight:500;font-size:13px;color:rgb(var(--p400));flex:1;}
.rs-badge{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;}
.rs-badge.linux{background:rgba(0,165,207,0.15);color:rgb(var(--s400));border:0.5px solid rgba(0,165,207,0.3);}
.rs-badge.windows{background:rgba(157,180,192,0.12);color:rgb(var(--p400));border:0.5px solid rgba(157,180,192,0.25);}
.rs-badge.both{background:rgba(107,142,160,0.15);color:rgb(var(--p600));border:0.5px solid rgba(107,142,160,0.3);}
.rs-badge.web{background:rgba(0,100,125,0.2);color:rgb(var(--s300));border:0.5px solid rgba(0,132,166,0.3);}
.rs-badge.msfvenom{background:rgba(74,86,92,0.3);color:rgb(var(--n300));border:0.5px solid rgb(var(--n600));}
.rs-badge.stable{background:rgba(0,67,85,0.4);color:rgb(var(--s300));border:0.5px solid rgb(var(--s600));}
.rs-code{background:rgb(var(--n900));border:0.5px solid rgb(var(--n700));border-radius:4px;
  padding:8px 10px;font-size:11px;color:rgb(var(--n300));line-height:1.6;
  white-space:pre-wrap;word-break:break-all;max-height:110px;overflow-y:auto;}
.rs-listener{background:rgba(0,67,85,0.25);border:0.5px solid rgba(0,132,166,0.3);
  border-radius:4px;padding:5px 10px;font-size:11px;color:rgb(var(--s300));margin-top:5px;}
.rs-listener b{color:rgb(var(--s500));}
.rs-upgrade{background:rgba(0,67,85,0.2);border:0.5px solid rgba(0,100,125,0.4);
  border-radius:4px;padding:5px 10px;font-size:11px;color:rgb(var(--s400));margin-top:5px;
  white-space:pre-wrap;}
.rs-upgrade b{color:rgb(var(--s300));}
.rs-notes{font-size:10px;color:rgb(var(--n500));margin-top:4px;font-style:italic;}
.rs-actions{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.rs-btn{padding:3px 9px;border-radius:3px;border:0.5px solid rgb(var(--n700));
  background:transparent;color:rgb(var(--n500));font-size:10px;font-family:monospace;cursor:pointer;}
.rs-btn:hover{background:rgb(var(--n800));color:rgb(var(--n200));border-color:rgb(var(--n600));}
.rs-btn.copied{color:rgb(var(--s400));border-color:rgb(var(--s600));}
.rs-empty{padding:30px;text-align:center;color:rgb(var(--n700));}
</style>

<div class="rs">
  <div class="rs-top">
    <div><label>LHOST</label><input id="rs-lhost" value="10.10.14.1" style="width:150px"></div>
    <div><label>LPORT</label><input id="rs-lport" value="4444" style="width:70px"></div>
    <button class="rs-gen-btn" onclick="rsGenerate()">&#x25B6; Generate</button>
    <div style="margin-left:auto;align-self:flex-end;">
      <div style="font-size:10px;color:rgb(var(--n500));margin-bottom:3px;">listener</div>
      <div class="rs-listener-top" id="rs-ltop">nc -lvnp 4444</div>
    </div>
  </div>
  <div class="rs-filter">
    <span class="rs-filter-label">filter:</span>
    <button class="rs-tag active" onclick="rsSetTag(this,'all')">all</button>
    <button class="rs-tag" onclick="rsSetTag(this,'linux')">linux</button>
    <button class="rs-tag" onclick="rsSetTag(this,'windows')">windows</button>
    <button class="rs-tag" onclick="rsSetTag(this,'web')">web</button>
    <button class="rs-tag" onclick="rsSetTag(this,'stable')">★ stable</button>
    <button class="rs-tag" onclick="rsSetTag(this,'msfvenom')">msfvenom</button>
    <input class="rs-search" id="rs-search" placeholder="search..." oninput="rsRender()">
  </div>
  <div class="rs-body" id="rs-body"></div>
</div>

let rsActiveTag='all';
function rsSetTag(el,t){document.querySelectorAll('.rs-tag').forEach(x=>x.classList.remove('active'));el.classList.add('active');rsActiveTag=t;rsRender();}
function rsGenerate(){document.getElementById('rs-ltop').textContent=`nc -lvnp ${document.getElementById('rs-lport').value}`;rsRender();}
function rsEsc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rsRender(){
  const h=document.getElementById('rs-lhost').value||'10.10.14.1';
  const p=document.getElementById('rs-lport').value||'4444';
  const q=document.getElementById('rs-search').value.toLowerCase();
  const body=document.getElementById('rs-body');body.innerHTML='';
  const filtered=RS_SHELLS.filter(s=>{
    const tm=rsActiveTag==='all'||s.tags.includes(rsActiveTag)||(rsActiveTag==='stable'&&s.stable);
    const sm=!q||s.name.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q)||(s.notes&&s.notes.toLowerCase().includes(q));
    return tm&&sm;
  });
  if(!filtered.length){body.innerHTML='<div class="rs-empty">no results</div>';return;}
  const byCat={};filtered.forEach(s=>{(byCat[s.cat]=byCat[s.cat]||[]).push(s);});
  Object.entries(byCat).forEach(([cat,shells])=>{
    const ch=document.createElement('div');ch.className='rs-cat-hdr';ch.textContent=cat;body.appendChild(ch);
    shells.forEach((s,i)=>{
      const code=s.code(h,p);
      const listener=s.listener?s.listener(p):`nc -lvnp ${p}`;
      const uid=`rs-${cat}-${i}`.replace(/\W/g,'-');
      const badges=s.tags.map(t=>`<span class="rs-badge ${t}">${t}</span>`).join('');
      const stb=s.stable?'<span class="rs-badge stable">★ stable</span>':'';
      const upg=s.upgrade?`<div class="rs-upgrade"><b>upgrade shell:</b>\n${rsEsc(s.upgrade)}</div>`:'';
      const notes=s.notes?`<div class="rs-notes">${s.notes}</div>`:'';
      const card=document.createElement('div');card.className='rs-card';
      card.innerHTML=`<div class="rs-card-top"><span class="rs-card-name">${s.name}</span>${badges}${stb}</div>
<div class="rs-code" id="${uid}">${rsEsc(code)}</div>
<div class="rs-listener"><b>listener:</b> ${rsEsc(listener)}</div>
${upg}${notes}
<div class="rs-actions">
  <button class="rs-btn" onclick="rsCp('${uid}',this,'copy payload')">copy payload</button>
  <button class="rs-btn" onclick="rsCpTxt(${JSON.stringify(listener)},this)">copy listener</button>
</div>`;
      body.appendChild(card);
    });
  });
}

function rsCp(id,btn,def){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  btn.textContent='copied!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent=def;btn.classList.remove('copied');},1500);
}
function rsCpTxt(txt,btn){
  navigator.clipboard.writeText(txt);btn.textContent='copied!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='copy listener';btn.classList.remove('copied');},1500);
}
rsRender();
</script>
